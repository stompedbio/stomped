<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { text-align: center; border: 1px solid #222; padding: 0 0 30px 0; border-radius: 12px; width: 350px; background: #0a0a0a; overflow: hidden; }
        
        /* Banner Section */
        .banner { width: 100%; height: 100px; background: linear-gradient(45deg, #1a1a1a, #000); margin-bottom: -50px; }
        
        #pfp { width: 100px; border-radius: 50%; border: 4px solid #0a0a0a; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .online { background: #43b581; }
        .links a { display: block; color: #fff; text-decoration: none; margin: 15px 20px; padding: 12px; border: 1px solid #222; }
        
        /* View Counter Styling */
        .views { font-size: 10px; color: #444; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="banner"></div>
    <img id="pfp" src="" alt="PFP">
    <h2 id="username">...</h2>
    <div><span id="status-dot" class="status-dot"></span> <span id="status-text">Checking...</span></div>
    
    <div class="links">
        <a href="https://feds.lol/stomped">feds.lol</a>
        <a id="discord-link" href="#">Discord</a>
    </div>

    <!-- Live View Counter -->
    <div class="views">
        Views: <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2FYOURGITHUB.github.io&count_bg=%23000000&title_bg=%23000000&icon=&icon_color=%23E7E7E7&title=hits&edge_flat=true">
    </div>
</div>

<script>
    const userID = "1099030510484856842";
    fetch(`https://api.lanyard.rest/v1/users/${userID}`)
        .then(r => r.json())
        .then(d => {
            document.getElementById('pfp').src = `https://cdn.discordapp.com/avatars/${userID}/${d.data.discord_user.avatar}.png?size=256`;
            document.getElementById('username').innerText = d.data.discord_user.username;
            document.getElementById('status-text').innerText = d.data.discord_status.toUpperCase();
            document.getElementById('status-dot').className = `status-dot ${d.data.discord_status}`;
        });
</script>
</body>
</html>
