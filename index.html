<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .main-card { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(15px); border-radius: 30px; padding: 40px; width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        #pfp { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #000; margin-bottom: 10px; object-fit: cover; }
        .bio { font-style: italic; margin: 15px 0; color: #ccc; }
        
        /* Icon Bar - Designed to hold your specific images */
        .icons { background: rgba(0,0,0,0.3); padding: 15px 25px; border-radius: 50px; display: flex; justify-content: space-between; margin-top: 20px; }
        .icons a img { width: 35px; height: 35px; transition: 0.3s; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        .icons a:hover img { transform: scale(1.2); }
        
        .status { font-size: 12px; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="main-card">
    <img id="pfp" src="" alt="PFP">
    <h2 id="username">Loading...</h2>
    <div class="status" id="status-text">OFFLINE</div>
    <div class="bio">just a random guy named kaz</div>

    <div class="icons">
        <!-- Make sure these files are in an 'icons' folder in your repo -->
        <a href="https://discord.com/users/1099030510484856842"><img src="icons/wings.png" alt="Wings"></a>
        <a href="https://github.com/notcorelol"><img src="icons/star.png" alt="Star"></a>
        <a href="https://last.fm/Iasts"><img src="icons/gun.png" alt="Gun"></a>
        <a href="https://roblox.com/users/3424908954/"><img src="icons/roblox.png" alt="Roblox"></a>
    </div>
</div>

<script>
    const userID = "1099030510484856842";
    fetch(`https://api.lanyard.rest/v1/users/${userID}`)
        .then(r => r.json())
        .then(d => {
            const u = d.data.discord_user;
            document.getElementById('pfp').src = `https://cdn.discordapp.com/avatars/${userID}/${u.avatar}.png?size=256`;
            document.getElementById('username').innerText = u.username;
            document.getElementById('status-text').innerText = d.data.discord_status.toUpperCase();
        });
</script>
</body>
</html>
